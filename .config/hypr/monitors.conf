# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs 

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
#monitor = eDP-1, 2880x1920@120, auto, 2

# Monitor ASUS (Izquierda) - Empieza en el origen
#monitor=ASUS-NAME, 1920x1080@60, 0x0, 1

# Monitor ACER (Derecha / Principal) - Empieza donde termina el Asus
#monitor=HDMI-A-1, 1920x1080@100, 1920x0, 1

# Monitor ASUS (Izquierda - 24")
# Se coloca en el origen 0x0
monitor = DP-1, 1920x1080@60, 0x0, 1

# Monitor ACER (Derecha - 27" - Principal)
# Se coloca justo después del Asus (1920 píxeles a la derecha)
monitor = HDMI-A-1, 1920x1080@100, 1920x0, 1
#monitor=HDMI-A-1,1920x1080@100,0x0,1    # Acer EK220Q @ 100Hz
#monitor=eDP-1,preferred,auto,1      # Set laptop screen to the right with preferred resolution and scale 1
# Laptop (eDP-1) a la izquierda en el origen
#monitor=eDP-1, 1920x1080, 0x0, 1

# Acer (HDMI-A-1) a la derecha (inicia en 1920p a la derecha)
# El parámetro 'default:true' lo marca como preferido para apps
monitor=HDMI-A-1, 1920x1080@100, 1920x0, 1
# Laptop screen toggle
bindd = SUPER ALT, H, Laptop screen off, exec, hyprctl keyword monitor "eDP-1,disable"
bindd = SUPER ALT, l, Laptop screen on , exec, hyprctl keyword monitor "eDP-1, preferred, 0x0, 1" 

